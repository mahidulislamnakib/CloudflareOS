name: Docs Quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-check:
    name: Markdown structure check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Check required beginner files
        run: |
          test -f README.md
          test -f START-HERE.md
          test -f AGENTS.md
          test -f docs/05-beginner-glossary.md

      - name: Check for real secrets in docs
        run: |
          matches=$(grep -RInE "(sk-[A-Za-z0-9]|api[_-]?key\s*=\s*['\"][A-Za-z0-9_-]{20,}|secret\s*=\s*['\"][A-Za-z0-9_-]{20,})" . --include="*.md" || true)
          if [ -n "$matches" ]; then
            echo "Possible secret found in Markdown. Remove it before merge."
            echo "Potential locations:"
            printf '%s\n' "$matches" | cut -d: -f1-2
            exit 1
          fi

      - name: Check beginner promise exists
        run: |
          grep -R "Simple explanation first" README.md docs AGENTS.md || true
